<!DOCTYPE html>
<html>
<head>
    <title>¡Sorpresa!</title>
    <style>
        body { 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background-color: #000; 
            color: white; 
            font-family: sans-serif; 
            overflow: hidden; 
        }

        /* Contenedor de la imagen (oculto al inicio) */
        #contenido { 
            display: none; 
            flex-direction: column; 
            align-items: center; 
        }

        img { max-width: 100%; height: auto; display: block; }

        /* Pantalla de carga que bloquea la vista */
        #loader-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        /* Círculo de carga (Spinner) */
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #333;
            border-top: 5px solid #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #status { font-size: 14px; color: #aaa; }
    </style>
</head>
